<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Information Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <video class="bg-video" autoplay loop muted>
        <source src="VID.mp4" type="video/mp4">
    </video>
    <div class="container">
        <header>
            <h1> Student Information Management System </h1>
            <p>Manage student records efficiently</p>
        </header>

        <nav class="tabs">
            <button class="tab-button active" data-tab="add-student">Add Student</button>
            <button class="tab-button" data-tab="view-students">View All</button>
            <button class="tab-button" data-tab="search-student">Search</button>
        </nav>

        
        <section id="add-student" class="tab-content active">
            <h2>Add New Student</h2>
            <form id="studentForm">
                <div class="form-group">
                    <label for="studentId">Student ID:</label>
                    <input type="text" id="studentId" required>
                </div>

                <div class="form-group">
                    <label for="studentName">Full Name:</label>
                    <input type="text" id="studentName" required>
                </div>

                <div class="form-group">
                    <label for="studentCourse">Course:</label>
                    <input type="text" id="studentCourse" required>
                </div>

                <div class="form-group">
                    <label for="studentYear">Year Level:</label>
                    <select id="studentYear" required>
                        <option value="">Select Year</option>
                        <option value="1st Year">1st Year</option>
                        <option value="2nd Year">2nd Year</option>
                        <option value="3rd Year">3rd Year</option>
                        <option value="4th Year">4th Year</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="studentAge">Age:</label>
                    <input type="number" id="studentAge" min="15" max="50" required>
                </div>

                <button type="submit" class="btn btn-primary">Add Student</button>
                <div id="addMessage" class="message"></div>
            </form>
        </section>

        
        <section id="view-students" class="tab-content">
            <h2>All Students</h2>
            <div id="studentsContainer" class="students-container">
                <p class="empty-message">No students found. Add a student to get started.</p>
            </div>
        </section>

        
        <section id="search-student" class="tab-content">
            <h2>Search Student</h2>
            <div class="search-container">
                <div class="search-options">
                    <div class="form-group">
                        <label for="searchOption">Search By:</label>
                        <select id="searchOption">
                            <option value="id">Student ID</option>
                            <option value="name">Name</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="searchInput">Enter Search Term:</label>
                        <input type="text" id="searchInput" placeholder="Enter Student ID or Name">
                    </div>

                    <button class="btn btn-secondary" onclick="searchStudent()">Search</button>
                </div>

                <div id="searchResults" class="search-results"></div>
            </div>
        </section>
    </div>

    
    <div id="editModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Update Student Information</h2>
            <form id="editForm">
                <input type="hidden" id="editStudentId">

                <div class="form-group">
                    <label for="editStudentName">Full Name:</label>
                    <input type="text" id="editStudentName">
                </div>

                <div class="form-group">
                    <label for="editStudentCourse">Course:</label>
                    <input type="text" id="editStudentCourse">
                </div>

                <div class="form-group">
                    <label for="editStudentYear">Year Level:</label>
                    <select id="editStudentYear">
                        <option value="1st Year">1st Year</option>
                        <option value="2nd Year">2nd Year</option>
                        <option value="3rd Year">3rd Year</option>
                        <option value="4th Year">4th Year</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="editStudentAge">Age:</label>
                    <input type="number" id="editStudentAge" min="15" max="50">
                </div>

                <button type="submit" class="btn btn-primary">Save Changes</button>
                <button type="button" class="btn btn-secondary" onclick="closeEditModal()">Cancel</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
